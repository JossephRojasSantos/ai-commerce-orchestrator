# Production compose — Oracle Cloud (4 OCPU / 24 GB RAM ARM64)
# Stack completo: backend + redis + postgres + prometheus + grafana

networks:
  ai-network:
    driver: bridge

volumes:
  redis-data:
    name: ai-redis-data
  db-data:
    name: ai-db-data
  grafana-data:
    name: ai-grafana-data

services:

  backend:
    image: ${DOCKERHUB_USERNAME}/ai-commerce-backend:${IMAGE_TAG:-latest}
    container_name: ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - ai-network
    env_file:
      - ../.env.prod
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_commerce}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ai_commerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ai-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: ai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - ai-network
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
