# =============================================================
# AI-Commerce Orchestrator — docker-compose base (AI-33)
# =============================================================
# Servicios placeholder con healthchecks, redes y volúmenes.
# Variables sensibles cargadas desde .env (nunca en git).
# =============================================================

networks:
  ai-network:
    driver: bridge

volumes:
  db-data:
    name: ai-db-data
  redis-data:
    name: ai-redis-data
  rabbitmq-data:
    name: ai-rabbitmq-data
  grafana-data:
    name: ai-grafana-data
  qdrant-data:
    name: ai-qdrant-data

services:

  # ---------------------------
  # Backend inteligente (API)
  # ---------------------------
  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: ai-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - ai-network
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ---------------------------
  # Base de datos PostgreSQL
  # ---------------------------
  db:
    image: postgres:16-alpine
    container_name: ai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_commerce}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ai_commerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------
  # Cache / Cola — Redis
  # ---------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    command: redis-server --appendonly yes

  # ---------------------------
  # Métricas — Prometheus
  # ---------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ai-network
    depends_on:
      - backend

  # ---------------------------
  # Dashboard — Grafana
  # ---------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - ai-network
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus

  # ---------------------------
  # Vector DB — Qdrant
  # ---------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - ai-network
    environment:
      QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD: 20000
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------
  # Message Broker — RabbitMQ
  # ---------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ai-network
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
